<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="camGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2137;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2118;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1f1500;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gnssGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#160d21;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e8a020"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4adf80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="#111" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#e8a020" font-size="14" font-weight="bold" letter-spacing="1">
    SHR 10GigE · Bedrock V3000 · Qt + Vimba X · GNSS — Complete Solution
  </text>

  <!-- === CAMERA BOX === -->
  <rect x="20" y="50" width="160" height="210" rx="6" fill="url(#camGrad)" stroke="#2a6aaa" stroke-width="1.5"/>
  <text x="100" y="72" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="bold">SVS-Vistek SHR</text>
  <text x="100" y="87" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="bold">10GigE Camera</text>
  <line x1="30" y1="95" x2="170" y2="95" stroke="#2a6aaa" stroke-width="0.5"/>
  <text x="100" y="112" text-anchor="middle" fill="#aac8e8" font-size="10">Sony IMX461/661/411</text>
  <text x="100" y="128" text-anchor="middle" fill="#e8a020" font-size="12" font-weight="bold">101–151 MP</text>
  <text x="100" y="144" text-anchor="middle" fill="#aac8e8" font-size="10">Bayer 12/14/16-bit</text>
  <text x="100" y="160" text-anchor="middle" fill="#aac8e8" font-size="10">Rolling / Global shutter</text>
  <text x="100" y="176" text-anchor="middle" fill="#aac8e8" font-size="10">M72 lens mount</text>
  <line x1="30" y1="186" x2="170" y2="186" stroke="#2a6aaa" stroke-width="0.5"/>
  <text x="100" y="202" text-anchor="middle" fill="#aac8e8" font-size="10">TTL-24V I/O</text>
  <text x="100" y="218" text-anchor="middle" fill="#aac8e8" font-size="10">SafeTrigger / RS232</text>
  <text x="100" y="234" text-anchor="middle" fill="#aac8e8" font-size="10">Strobe controller</text>
  <text x="100" y="250" text-anchor="middle" fill="#aac8e8" font-size="10">Cleanroom rated</text>

  <!-- === GNSS BOX === -->
  <rect x="20" y="272" width="160" height="58" rx="6" fill="url(#gnssGrad)" stroke="#6a3aaa" stroke-width="1.5"/>
  <text x="100" y="291" text-anchor="middle" fill="#c080ff" font-size="11" font-weight="bold">GNSS Receiver</text>
  <text x="100" y="307" text-anchor="middle" fill="#c0a0e8" font-size="10">NMEA 0183 · RS232</text>
  <text x="100" y="322" text-anchor="middle" fill="#c0a0e8" font-size="10">1–20 Hz · RTK optional</text>

  <!-- === V3000 BOX === -->
  <rect x="330" y="50" width="240" height="280" rx="6" fill="url(#pcGrad)" stroke="#2aaa5a" stroke-width="1.5"/>
  <text x="450" y="72" text-anchor="middle" fill="#4adf80" font-size="11" font-weight="bold">SolidRun Bedrock V3000</text>
  <line x1="340" y1="80" x2="560" y2="80" stroke="#2aaa5a" stroke-width="0.5"/>
  <text x="450" y="97" text-anchor="middle" fill="#a0e8b8" font-size="10">AMD Ryzen Embedded V3C48</text>
  <text x="450" y="112" text-anchor="middle" fill="#a0e8b8" font-size="10">8-core Zen3+ · 6nm · 3.8 GHz</text>
  <line x1="340" y1="122" x2="560" y2="122" stroke="#2aaa5a" stroke-width="0.5"/>

  <!-- NIC highlight -->
  <rect x="345" y="130" width="230" height="30" rx="4" fill="#0a2a15" stroke="#e8a020" stroke-width="1"/>
  <text x="460" y="148" text-anchor="middle" fill="#e8a020" font-size="10" font-weight="bold">2× Native 10GbE SFP+ (PCIe Gen4)</text>

  <text x="450" y="177" text-anchor="middle" fill="#a0e8b8" font-size="10">96 GB DDR5-4800 ECC</text>
  <text x="450" y="192" text-anchor="middle" fill="#a0e8b8" font-size="10">3× NVMe PCIe Gen4 ×4</text>
  <text x="450" y="207" text-anchor="middle" fill="#a0e8b8" font-size="10">3× USB 3.2 Gen2</text>
  <text x="450" y="222" text-anchor="middle" fill="#a0e8b8" font-size="10">12V–60V DC · IP40</text>
  <text x="450" y="237" text-anchor="middle" fill="#a0e8b8" font-size="10">-40°C to 85°C fanless</text>
  <line x1="340" y1="247" x2="560" y2="247" stroke="#2aaa5a" stroke-width="0.5"/>
  <text x="450" y="262" text-anchor="middle" fill="#a0e8b8" font-size="10">Ubuntu 22.04 LTS</text>
  <text x="450" y="277" text-anchor="middle" fill="#a0e8b8" font-size="10">Real-time kernel scheduling</text>
  <text x="450" y="292" text-anchor="middle" fill="#a0e8b8" font-size="10">Core isolation · NVMe tuning</text>
  <text x="450" y="318" text-anchor="middle" fill="#a0e8b8" font-size="10">DIN-Rail / Wall mount</text>

  <!-- === SOFTWARE BOX === -->
  <rect x="620" y="50" width="260" height="280" rx="6" fill="url(#appGrad)" stroke="#aa7a1a" stroke-width="1.5"/>
  <text x="750" y="72" text-anchor="middle" fill="#e8c060" font-size="11" font-weight="bold">Software Stack</text>
  <line x1="630" y1="80" x2="870" y2="80" stroke="#aa7a1a" stroke-width="0.5"/>

  <!-- Vimba X block -->
  <rect x="632" y="88" width="236" height="52" rx="3" fill="#1a1200" stroke="#aa7a1a" stroke-width="0.8"/>
  <text x="750" y="104" text-anchor="middle" fill="#e8c060" font-size="10" font-weight="bold">Vimba X 2026-1 (C++ API)</text>
  <text x="750" y="118" text-anchor="middle" fill="#c0a840" font-size="9">VmbSystem · CameraPtr · FrameObserver</text>
  <text x="750" y="131" text-anchor="middle" fill="#c0a840" font-size="9">VmbImageTransform · Bayer→RGB8</text>

  <!-- Qt block -->
  <rect x="632" y="148" width="236" height="52" rx="3" fill="#1a1200" stroke="#aa7a1a" stroke-width="0.8"/>
  <text x="750" y="164" text-anchor="middle" fill="#e8c060" font-size="10" font-weight="bold">Qt 6 Application</text>
  <text x="750" y="178" text-anchor="middle" fill="#c0a840" font-size="9">Trigger control · Status panel</text>
  <text x="750" y="191" text-anchor="middle" fill="#c0a840" font-size="9">GNSS panel · Preview thumbnail</text>

  <!-- NMEA block -->
  <rect x="632" y="208" width="236" height="52" rx="3" fill="#1a1200" stroke="#aa7a1a" stroke-width="0.8"/>
  <text x="750" y="224" text-anchor="middle" fill="#e8c060" font-size="10" font-weight="bold">NmeaReader (QSerialPort)</text>
  <text x="750" y="238" text-anchor="middle" fill="#c0a840" font-size="9">GGA + RMC parser · checksum</text>
  <text x="750" y="251" text-anchor="middle" fill="#c0a840" font-size="9">Atomic GnssRecord · SidecarWriter</text>

  <!-- Output block -->
  <rect x="632" y="268" width="236" height="52" rx="3" fill="#0d0d0d" stroke="#606060" stroke-width="0.8"/>
  <text x="750" y="284" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="bold">Output per Frame</text>
  <text x="750" y="298" text-anchor="middle" fill="#909090" font-size="9">frame_NNNNN.ppm  (RGB8 image)</text>
  <text x="750" y="311" text-anchor="middle" fill="#909090" font-size="9">frame_NNNNN.json (GNSS + meta)</text>

  <!-- === ARROWS === -->

  <!-- Camera → V3000 (10GigE) -->
  <line x1="182" y1="120" x2="328" y2="155" stroke="#e8a020" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="205" y="115" width="92" height="18" rx="3" fill="#111"/>
  <text x="251" y="127" text-anchor="middle" fill="#e8a020" font-size="9" font-weight="bold">10GigE · 1.25 GB/s</text>

  <!-- GNSS → V3000 (RS232) -->
  <line x1="182" y1="295" x2="328" y2="280" stroke="#c080ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="199" y="280" width="88" height="18" rx="3" fill="#111"/>
  <text x="243" y="292" text-anchor="middle" fill="#c080ff" font-size="9">RS232 → USB</text>

  <!-- V3000 → Software -->
  <line x1="572" y1="190" x2="618" y2="190" stroke="#4adf80" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="574" y="178" width="42" height="14" rx="2" fill="#111"/>
  <text x="595" y="188" text-anchor="middle" fill="#4adf80" font-size="8">SDK</text>

  <!-- Legend -->
  <line x1="30" y1="335" x2="55" y2="335" stroke="#e8a020" stroke-width="2"/>
  <text x="60" y="338" fill="#e8a020" font-size="9">10GigE data stream</text>
  <line x1="155" y1="335" x2="180" y2="335" stroke="#c080ff" stroke-width="1.5"/>
  <text x="185" y="338" fill="#c080ff" font-size="9">RS232 NMEA</text>
  <line x1="270" y1="335" x2="295" y2="335" stroke="#4adf80" stroke-width="2"/>
  <text x="300" y="338" fill="#4adf80" font-size="9">SDK / software</text>
</svg>
